experiment:
  name: auditory_rehabilitation_text_only
  description: Evaluation of Croatian generated text for auditory rehabilitation needs.

generation:
  adapter: manual_csv
  candidate_count_per_condition: 5
  request_extra_factor: 2
  sleep_seconds_between_requests: 1
  words:
    target_classes: [N, SN, S, SV, V]
    saturation_levels: [40, 50, 60, 70, 80]
    candidates_per_group: 50
  sentences:
    target_classes: [N, SN, S, SV, V]
    saturation_levels: [50, 60, 70]
    candidates_per_group: 50
    min_words: 3
    max_words: 5
  models:
    ollama: []
    manual_baseline: manual_csv

ollama:
  model: "llama3.1:8b"
  base_url: "http://localhost:11434"
  temperature: 0.8
  max_retries: 3

experiment_grid:
  target_classes: ["N", "SN", "S", "SV", "V"]
  saturation_levels: [50, 70]
  text_types: ["word", "sentence"]
  prompt_strategies: ["paper_style", "strict_plain_list"]

validation:
  dictionary:
    mode: none
    local_wordlist_path:
    manual_review_csv_path:
  sentence:
    min_words: 3
    max_words: 5

metrics:
  pcd_version: pcd_paper_style

outputs:
  raw_generations_dir: outputs/raw_generations
  validated_dir: outputs/validated
  audio_dir: outputs/audio
  reports_dir: outputs/reports
  chatgpt_prompts_dir: outputs/chatgpt_prompts
