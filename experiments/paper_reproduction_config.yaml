experiment:
  name: paper_reproduction
  description: Reproduction-oriented Croatian auditory training prompt structure.

generation:
  adapter: manual_csv
  request_extra_factor: 2
  sleep_seconds_between_requests: 1

ollama:
  model: "llama3.1:8b"
  base_url: "http://localhost:11434"
  temperature: 0.8
  max_retries: 3

experiment_blocks:
  - name: words
    text_type: word
    target_classes: ["N", "SN", "S", "SV", "V"]
    saturation_levels: [40, 50, 60, 70, 80]
    candidate_count_per_condition: 11
    prompt_strategies: ["paper_style"]
  - name: sentences
    text_type: sentence
    target_classes: ["N", "SN", "S", "SV", "V"]
    saturation_levels: [50, 70]
    candidate_count_per_condition: 21
    prompt_strategies: ["paper_style"]

validation:
  dictionary:
    mode: none
    local_wordlist_path:
    manual_review_csv_path:
  sentence:
    min_words: 3
    max_words: 5

metrics:
  pcd_version: pcd_paper_style

outputs:
  raw_generations_dir: outputs/raw_generations
  validated_dir: outputs/validated
  audio_dir: outputs/audio
  reports_dir: outputs/reports
  chatgpt_prompts_dir: outputs/chatgpt_prompts
  manifests_dir: outputs/manifests

